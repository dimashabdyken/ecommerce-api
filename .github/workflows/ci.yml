name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/ecommerce_db
      SECRET_KEY: ci-test-secret-key
      STRIPE_WEBHOOK_SECRET: whsec_ci_test_secret
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Sync dependencies from uv.lock
        run: |
          uv sync --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests with pytest
        run: uv run pytest -q

      - name: Build Docker image
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: docker build -t ecommerce-api:ci .
