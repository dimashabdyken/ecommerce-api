apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-api-secrets
  namespace: ecommerce
  labels:
    app: ecommerce-api
type: Opaque
# ИСПОЛЬЗУЕМ stringData: Kubernetes сам закодирует эти значения в Base64 при применении!
stringData:
  # Вставьте сюда ваш ВАШ ПАРОЛЬ и ВАШ RDS ENDPOINT из вывода terraform:
  DATABASE_URL: "postgresql+asyncpg://ecommerce_admin:<ВАШ_ПАРОЛЬ>@<ВАШ_RDS_ENDPOINT>:5432/ecommerce"
  SECRET_KEY: "super-secret-key-replace-me"
  STRIPE_SECRET_KEY: "sk_test_replace_me"
  STRIPE_WEBHOOK_SECRET: "whsec_replace_me"
